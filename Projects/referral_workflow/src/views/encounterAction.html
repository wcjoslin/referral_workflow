<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encounter Status</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f6f8; color: #222; }
    .container { max-width: 820px; margin: 32px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; margin-bottom: 24px; color: #1a1a2e; }
    .card { background: #fff; border-radius: 8px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: .06em; color: #666; margin-bottom: 14px; }
    .field { display: flex; gap: 8px; margin-bottom: 8px; font-size: 0.95rem; }
    .field .label { color: #555; min-width: 160px; }
    .field .value { font-weight: 500; }
    .btn { padding: 10px 28px; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #0b5ed7; }
    .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 0.92rem; }
    .checkbox-row input { width: auto; }
    .status-bar { padding: 10px 16px; border-radius: 6px; font-size: 0.92rem; margin-top: 12px; display: none; }
    .status-bar.success { background: #d1e7dd; color: #0a3622; display: block; }
    .status-bar.error { background: #f8d7da; color: #58151c; display: block; }
    .back-link { font-size: 0.88rem; color: #0d6efd; text-decoration: none; margin-bottom: 16px; display: inline-block; }
    .back-link:hover { text-decoration: underline; }
    .state-badge { font-size: 0.8rem; font-weight: 600; padding: 3px 10px; border-radius: 12px; background: #e0e7ff; color: #3730a3; margin-left: 10px; vertical-align: middle; }
  </style>
</head>
<body>
<!--__NAV__-->
<script>/*__ENCOUNTER_DATA__*/</script>
<div class="container">
  <a class="back-link" href="/referrals/__ID__/review">&larr; Back to Review</a>
  <h1>Encounter Status <span class="state-badge" id="stateBadge"></span></h1>

  <div class="card">
    <h2>Patient & Appointment</h2>
    <div class="field"><span class="label">Patient</span><span class="value" id="patientName"></span></div>
    <div class="field"><span class="label">Reason</span><span class="value" id="reason"></span></div>
    <div class="field"><span class="label">Appointment</span><span class="value" id="appointment"></span></div>
    <div class="field"><span class="label">Location</span><span class="value" id="location"></span></div>
    <div class="field"><span class="label">Provider</span><span class="value" id="provider"></span></div>
  </div>

  <div class="card" id="actionCard">
    <h2>Mark Encounter Complete</h2>
    <div class="checkbox-row">
      <input type="checkbox" id="sendInterim" checked />
      <label for="sendInterim">Send interim update to referring provider</label>
    </div>
    <button class="btn btn-primary" onclick="submitEncounter()">Mark Encounter Complete</button>
    <div class="status-bar" id="statusBar"></div>
  </div>

  <div class="card" id="doneCard" style="display:none;">
    <h2>Encounter Recorded</h2>
    <p style="font-size:0.95rem;color:#555;">This referral has been marked as encountered. Awaiting final consult note (PRD-04).</p>
  </div>
</div>

<script>
  const data = window.__ENCOUNTER_DATA__;
  const referralId = data.referralId;

  document.querySelector('.back-link').href = `/referrals/${referralId}/review`;
  document.getElementById('patientName').textContent =
    `${data.patient.firstName} ${data.patient.lastName}`;
  document.getElementById('reason').textContent = data.referral.reasonForReferral || '—';
  document.getElementById('appointment').textContent =
    data.referral.appointmentDate ? new Date(data.referral.appointmentDate).toLocaleString() : '—';
  document.getElementById('location').textContent = data.referral.appointmentLocation || '—';
  document.getElementById('provider').textContent = data.referral.scheduledProvider || '—';
  document.getElementById('stateBadge').textContent = data.referral.state;

  // If already in Encounter or later state, hide action card
  const postEncounterStates = ['Encounter', 'Closed', 'Closed-Confirmed'];
  if (postEncounterStates.includes(data.referral.state)) {
    document.getElementById('actionCard').style.display = 'none';
    document.getElementById('doneCard').style.display = 'block';
  }

  async function submitEncounter() {
    const sendInterimUpdate = document.getElementById('sendInterim').checked;
    try {
      const res = await fetch(`/referrals/${referralId}/encounter`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sendInterimUpdate }),
      });
      const json = await res.json();
      if (res.ok) {
        showStatus('Encounter recorded. Interim update sent to referring provider.', 'success');
        document.getElementById('actionCard').style.display = 'none';
        document.getElementById('doneCard').style.display = 'block';
        document.getElementById('stateBadge').textContent = 'Encounter';
      } else {
        showStatus(json.error || 'An error occurred.', 'error');
      }
    } catch {
      showStatus('Network error — please try again.', 'error');
    }
  }

  function showStatus(message, type) {
    const bar = document.getElementById('statusBar');
    bar.textContent = message;
    bar.className = `status-bar ${type}`;
  }
</script>
</body>
</html>
