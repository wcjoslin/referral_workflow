<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generate Consult Note</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f6f8; color: #222; }
    .container { max-width: 820px; margin: 32px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; margin-bottom: 24px; color: #1a1a2e; }
    .card { background: #fff; border-radius: 8px; padding: 20px 24px; margin-bottom: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .card h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: .06em; color: #666; margin-bottom: 14px; }
    .field { display: flex; gap: 8px; margin-bottom: 8px; font-size: 0.95rem; }
    .field .label { color: #555; min-width: 160px; }
    .field .value { font-weight: 500; }
    .state-badge { font-size: 0.8rem; font-weight: 600; padding: 3px 10px; border-radius: 12px; background: #e0e7ff; color: #3730a3; margin-left: 10px; vertical-align: middle; }
    textarea { width: 100%; min-height: 280px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-family: monospace; font-size: 0.9rem; line-height: 1.5; resize: vertical; }
    .btn { padding: 10px 28px; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .btn-primary { background: #0d6efd; color: #fff; margin-top: 12px; }
    .btn-primary:hover { background: #0b5ed7; }
    .btn-primary:disabled { background: #6c757d; cursor: not-allowed; }
    .status-bar { padding: 10px 16px; border-radius: 6px; font-size: 0.92rem; margin-top: 12px; display: none; }
    .status-bar.success { background: #d1e7dd; color: #0a3622; display: block; }
    .status-bar.error { background: #f8d7da; color: #58151c; display: block; }
    .hint { font-size: 0.82rem; color: #888; margin-top: 6px; }
  </style>
</head>
<body>
<!--__NAV__-->
<script>/*__CONSULT_DATA__*/</script>
<div class="container">
  <h1>Generate Consult Note <span class="state-badge" id="stateBadge"></span></h1>

  <div class="card">
    <h2>Patient</h2>
    <div class="field"><span class="label">Name</span><span class="value" id="patientName"></span></div>
    <div class="field"><span class="label">Date of Birth</span><span class="value" id="patientDob"></span></div>
    <div class="field"><span class="label">Reason for Referral</span><span class="value" id="referralReason"></span></div>
  </div>

  <div class="card" id="noteCard">
    <h2>Clinical Note Text</h2>
    <p class="hint">Enter or paste the specialist's clinical findings. Gemini will structure this into C-CDA sections (Chief Complaint, HPI, Assessment, Plan, Physical Exam).</p>
    <textarea id="noteText" placeholder="Enter clinical note text here..."></textarea>
    <button class="btn btn-primary" id="submitBtn" onclick="submitNote()">Generate &amp; Send Consult Note</button>
    <div class="status-bar" id="statusBar"></div>
  </div>
</div>

<script>
  const data = window.__CONSULT_DATA__;
  const referralId = data.referralId;

  document.getElementById('patientName').textContent =
    `${data.patient.firstName} ${data.patient.lastName}`;
  document.getElementById('patientDob').textContent = data.patient.dateOfBirth || '—';
  document.getElementById('referralReason').textContent = data.referral.reasonForReferral || '—';
  document.getElementById('stateBadge').textContent = data.referral.state;

  // Hide form if not in Encounter state
  if (data.referral.state !== 'Encounter') {
    document.getElementById('noteCard').innerHTML =
      '<h2>Consult Note</h2><p style="color:#666;">This referral is in <strong>' +
      data.referral.state + '</strong> state. Consult note generation is only available in the Encounter state.</p>';
  }

  async function submitNote() {
    const noteText = document.getElementById('noteText').value.trim();
    if (!noteText) { showStatus('Please enter clinical note text.', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Generating...';
    showStatus('Structuring clinical text and generating C-CDA...', 'success');

    try {
      const res = await fetch(`/referrals/${referralId}/consult-note`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ noteText }),
      });
      const json = await res.json();
      if (res.ok) {
        showStatus('Consult Note C-CDA generated and sent to referring provider. Referral state: Closed.', 'success');
        document.getElementById('stateBadge').textContent = 'Closed';
        document.getElementById('noteText').disabled = true;
      } else {
        showStatus(json.error || 'An error occurred.', 'error');
        btn.disabled = false;
        btn.textContent = 'Generate & Send Consult Note';
      }
    } catch {
      showStatus('Network error — please try again.', 'error');
      btn.disabled = false;
      btn.textContent = 'Generate & Send Consult Note';
    }
  }

  function showStatus(message, type) {
    const bar = document.getElementById('statusBar');
    bar.textContent = message;
    bar.className = `status-bar ${type}`;
  }
</script>
</body>
</html>
